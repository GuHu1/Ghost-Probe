<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ghost-Probe Event Gallery</title>
<style>
  html,body{margin:0;height:100%;background:#11141a;color:#ddd;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  body{display:flex;flex-direction:column}
  .bar{display:flex;gap:12px;align-items:center;padding:8px 14px;
    background:#1a1d22;border-bottom:1px solid #333;font-size:14px;flex-wrap:wrap}
  #counter{font-weight:bold;color:#fff;min-width:64px}
  .hint{color:#8a8f99;font-size:12px}
  .cap{color:#aab;font-size:12px;flex:1;min-width:200px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  button{background:#2a2f3a;color:#ddd;border:1px solid #444;border-radius:4px;
    padding:4px 12px;cursor:pointer}
  button:hover{background:#353b48}
  input{width:74px;background:#0d0f13;color:#ddd;border:1px solid #444;
    border-radius:4px;padding:3px 6px}
  #wrap{flex:1;display:flex;align-items:center;justify-content:center;
    overflow:auto;padding:10px}
  img{max-width:100%;max-height:100%;box-shadow:0 0 24px #000}
</style>
</head>
<body>
  <div class="bar">
    <span id="counter">1 / 20</span>
    <button onclick="go(-1)">&#8592; Prev</button>
    <button onclick="go(1)">Next &#8594;</button>
    <span class="hint">&#8593;/&#8595; or j/k = &plusmn;10</span>
    <span>goto <input id="jump" type="number" min="1" value="1">
      <button onclick="jumpTo()">Go</button></span>
    <span id="cap" class="cap"></span>
  </div>
  <div id="wrap"><img id="view" src="" alt="event"></div>
<script>
const data = [{"f": "event_0000.png", "c": "scene-0061 | GHOST | dist 51.0 m | osz 2 | 42641eb6adcb"}, {"f": "event_0001.png", "c": "scene-0061 | GHOST | dist 52.6 m | osz 2 | bd26c2cdb22d"}, {"f": "event_0002.png", "c": "scene-0061 | GHOST | dist 47.9 m | osz 2 | 42641eb6adcb"}, {"f": "event_0003.png", "c": "scene-0061 | GHOST | dist 50.4 m | osz 2 | bd26c2cdb22d"}, {"f": "event_0004.png", "c": "scene-0061 | GHOST | dist 53.1 m | osz 1 | 4080c30aa710"}, {"f": "event_0005.png", "c": "scene-0061 | GHOST | dist 40.8 m | osz 2 | 56a71c208ac6"}, {"f": "event_0006.png", "c": "scene-0061 | GHOST | dist 41.1 m | osz 2 | 42641eb6adcb"}, {"f": "event_0007.png", "c": "scene-0061 | GHOST | dist 51.3 m | osz 1 | 4080c30aa710"}, {"f": "event_0008.png", "c": "scene-0061 | GHOST | dist 21.6 m | osz 4 | c1958768d486"}, {"f": "event_0009.png", "c": "scene-0061 | GHOST | dist 35.5 m | osz 4 | a60047adc78a"}, {"f": "event_0010.png", "c": "scene-0061 | GHOST | dist 40.8 m | osz 4 | 86ed8530809d"}, {"f": "event_0011.png", "c": "scene-0061 | GHOST | dist 36.5 m | osz 3 | a60047adc78a"}, {"f": "event_0012.png", "c": "scene-0061 | GHOST | dist 42.5 m | osz 4 | bd26c2cdb22d"}, {"f": "event_0013.png", "c": "scene-0061 | GHOST | dist 41.4 m | osz 4 | d7cd73e84d44"}, {"f": "event_0014.png", "c": "scene-0061 | GHOST | dist 37.9 m | osz 2 | a60047adc78a"}, {"f": "event_0015.png", "c": "scene-0061 | GHOST | dist 16.5 m | osz 3 | c1958768d486"}, {"f": "event_0016.png", "c": "scene-0061 | GHOST | dist 32.5 m | osz 4 | a0049f953750"}, {"f": "event_0017.png", "c": "scene-0061 | GHOST | dist 32.5 m | osz 4 | 61dd7d03d7ad"}, {"f": "event_0018.png", "c": "scene-0061 | GHOST | dist 37.9 m | osz 3 | 86ed8530809d"}, {"f": "event_0019.png", "c": "scene-0061 | GHOST | dist 40.8 m | osz 3 | d7cd73e84d44"}];
let i = 0;
function show(){
  document.getElementById('view').src = data[i].f;
  document.getElementById('counter').textContent = (i+1)+' / '+data.length;
  document.getElementById('cap').textContent = data[i].c;
  document.getElementById('jump').value = i+1;
  document.title = 'Event '+(i+1)+' / '+data.length;
}
function go(d){ i=Math.max(0,Math.min(data.length-1,i+d)); show(); }
function jumpTo(){
  const v=parseInt(document.getElementById('jump').value,10);
  if(v>=1 && v<=data.length){ i=v-1; show(); }
}
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
  else if(e.key==='j') go(10);
  else if(e.key==='k') go(-10);
  else if(e.key==='q') window.close();
});
show();
</script>
</body>
</html>
